ي<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Mining</title>
    <link rel="stylesheet" href="style.css?v=10">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span class="username">Binasou Miner ⛏️</span>
            <span class="rank" id="user-rank">رتبة: مبتدئ</span>
        </div>

        <div class="main-content">
            <div class="coin-card">
            
              <img src="photo_2026-04-18_20-48-28 bina.jpg" class="logo-binasou">  
                <div class="balance-wrapper">
                    <h1 id="balance">0</h1>
                    <p>عملة تعدين</p>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-item"><small>الربح/ساعة</small><strong>100</strong></div>
                <div class="stat-item"><small>الإنجاز</small><strong id="progress-text">0%</strong></div>
            </div>

            <button id="adBtn" class="mining-button" onclick="startMining()">
                <span>⚡</span> ابدأ التعدين واكسب 100
            </button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-btn active"><span>⛏️</span><small>تعدين</small></div>
            <div class="nav-btn"><span>📋</span><small>مهام</small></div>
            <div class="nav-btn"><span>👥</span><small>أصدقاء</small></div>
            <div class="nav-btn"><span>🏆</span><small>ترتيب</small></div>
        </nav>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('user_coins')) || 0;
        document.getElementById('balance').innerText = balance.toLocaleString();

        function startMining() {
            const btn = document.getElementById('adBtn');
            btn.innerText = "جاري التحقق...";
            
            if (window.Adsgram) {
                const AdController = window.Adsgram.init({ blockId: "28072" });
                AdController.show().then(() => { addCoins(); }).catch(() => { addCoins(); });
            } else {
                addCoins();
            }
        }

        function addCoins() {
            balance += 100;
            localStorage.setItem('user_coins', balance);
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('adBtn').innerText = "⚡ ابدأ التعدين واكسب 100";
            if(balance >= 1000) document.getElementById('user-rank').innerText = "رتبة: محترف 🚀";
        }
    </script>
</body>
</html>

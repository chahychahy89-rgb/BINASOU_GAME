<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINASOU GOLD</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 0; }
        .header { padding: 20px; border-bottom: 2px solid #ffae00; background: #111; }
        #balance { font-size: 50px; color: #ffae00; font-weight: bold; }
        .coin {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(#ffae00, #b8860b);
            margin: 50px auto; display: flex; align-items: center;
            justify-content: center; font-size: 80px; color: #000;
            font-weight: bold; border: 5px solid #fff; cursor: pointer;
        }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; }
        .nav div { flex: 1; padding: 20px; color: #ffae00; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div id="balance">0</div>
    <div>BINASOU GOLD</div>
</div>

<div id="mine-page">
    <div class="coin" onclick="tap()">B</div>
    <p>اضغط على حرف B للتعدين</p>
</div>

<div class="nav">
    <div onclick="alert('قريباً.. دعوة الأصدقاء')">الأصدقاء</div>
    <div onclick="location.reload()">تعدين</div>
    <div onclick="alert('قريباً.. المهام اليومية')">المهام</div>
</div>

<script>
    let points = parseInt(localStorage.getItem('b_pts')) || 0;
    document.getElementById('balance').innerText = points;

    function tap() {
        points++;
        document.getElementById('balance').innerText = points;
        localStorage.setItem('b_pts', points);
    }
</script>

</body>
</html>

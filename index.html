<div class="task">
                <div><span class="task-title">جروب التليجرام</span><span class="task-reward">+2,000💰</span></div>
                <a href="https://t.me/binasou" target="_blank" class="go-btn" onclick="reward(2000)">انضم</a>
            </div>
        </div>

        <div id="friendsPage" class="page">
            <h2 style="color: var(--gold);">دعوة الأصدقاء 👥</h2>
            <div class="task" style="flex-direction: column; gap: 15px; text-align: center;">
                <p>شارك الرابط مع أصدقائك واحصل على 2,500 قطعة لكل صديق!</p>
                <button class="go-btn" style="width: 100%; border: none;" onclick="invite()">إرسال رابط الدعوة 🚀</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="changeTab('friendsPage', this)"><span>👥</span> الأصدقاء</button>
        <button class="nav-btn active" onclick="changeTab('miningPage', this)"><span>⛏️</span> تعدين</button>
        <button class="nav-btn" onclick="changeTab('tasksPage', this)"><span>📋</span> المهام</button>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('binasou_vFinal')) || 0;
        const display = document.getElementById('scoreDisplay');

        function updateScore() {
            display.innerText = score.toLocaleString();
            localStorage.setItem('binasou_vFinal', score);
        }

        function changeTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            btn.classList.add('active');
        }

        document.getElementById('coinBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score += 1;
            updateScore();
        });

        function reward(amt) {
            setTimeout(() => {
                score += amt;
                updateScore();
                alert('تمت إضافة المكافأة! 🎉');
            }, 3000);
        }

        function invite() {
            const link = "https://t.me/share/url?url=https://t.me/binasou_win_bot&text=انضم إلي في BINASOU واجمع الذهب! ⛏️💰";
            window.open(link, '_blank');
        }

        updateScore();
    </script>
</body>
</html>

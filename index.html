<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold Official</title>
    <style>
        /* التنسيقات العامة */
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .page { display: none; flex: 1; padding: 20px; text-align: center; overflow-y: auto; }
        .page.active { display: block; }

        /* الدائرة الذهبية مع اسم Binasou */
        .gold-circle { 
            width: 170px; height: 170px; border-radius: 50%; 
            border: 5px solid #ffb400; margin: 30px auto; 
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold; color: #ffb400; 
            text-shadow: 0 0 15px #ffb400; 
            box-shadow: 0 0 30px rgba(255, 180, 0, 0.5);
            background: radial-gradient(circle, #1a1a1a, #000);
            cursor: pointer; transition: transform 0.1s;
        }
        .gold-circle:active { transform: scale(0.95); }

        /* الرصيد والأزرار */
        .balance-val { color: #ffb400; font-size: 4rem; font-weight: bold; margin: 10px 0; }
        .main-btn { background: linear-gradient(145deg, #ffb400, #cc9200); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 90%; font-size: 1.2rem; cursor: pointer; }
        
        /* القائمة السفلية */
        .nav-bar { background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; cursor: pointer; font-size: 0.9rem; }
        .nav-item.active { color: #ffb400; font-weight: bold; }

        /* تنسيق المهام */
        .task-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>

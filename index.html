<script>
        // استعادة الرصيد المحفوظ أو البدء بـ 2100 كما في صوركِ
        let score = parseInt(localStorage.getItem('binasou_score')) || 2100;
        const balDisplay = document.getElementById('user-balance');
        balDisplay.innerText = score.toLocaleString();

        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        function mine() {
            score += 100;
            update();
        }

        function doTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                score += reward;
                update();
                alert("تهانينا! تمت إضافة المكافأة لحسابك 🎉");
            }, 2000);
        }

        function invite() {
            const botUrl = "https://t.me/binasou_win_bot";
            const text = "انضم معي في أفضل بوت تعدين! 🚀";
            window.open(https://t.me/share/url?url=${botUrl}&text=${text});
        }

        function update() {
            localStorage.setItem('binasou_score', score);
            balDisplay.innerText = score.toLocaleString();
        }
    </script>
</body>
</html>

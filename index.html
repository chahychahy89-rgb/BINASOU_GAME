<script>
        let score = parseInt(localStorage.getItem('bina_gold')) || 0;
        const balDisp = document.getElementById('balance');

        function updateUI() {
            balDisp.innerText = score.toLocaleString();
            localStorage.setItem('bina_gold', score);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(id === 'friendsPage') document.getElementById('navF').classList.add('active');
            if(id === 'miningPage') document.getElementById('navM').classList.add('active');
            if(id === 'tasksPage') document.getElementById('navT').classList.add('active');
        }

        // نظام النقر
        document.getElementById('tapBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score += 1;
            updateUI();
        });

        // نظام المهام
        function completeTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                score += reward;
                updateUI();
                alert('تم إضافة المكافأة بنجاح!');
            }, 4000);
        }

        // نظام الإعلانات
        const ads = window.Adsgram ? window.Adsgram.init({ blockId: "int-286" }) : null;
        function showAd() {
            if(ads) ads.show().then(() => { score += 1000; updateUI(); }).catch(() => alert('الإعلان غير متوفر'));
        }

        function shareRef() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=العب معي BINASOU واجمع الذهب!");
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINASOU GAME</title>
    <script src="https://adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>BINASOU GOLD ⛏️</h1>
        
        <div class="circle" id="click-area">
            <span>Binasou</span>
        </div>

        <div class="score-container">
            <span id="ts">2,900</span>
        </div>

        <div class="footer-menu">
            <button onclick="alert('قريباً')">أصدقاء</button>
            <button onclick="alert('قريباً')">مهام</button>
            <button onclick="location.reload()">تعدين</button>
        </div>
    </div>

    <script>
        // 1. تعريف المتغيرات
        let count = parseInt(localStorage.getItem('bina_count')) || 2900;
        const scoreDisplay = document.getElementById('ts');
        const clickArea = document.getElementById('click-area');

        // 2. تحديث الشاشة
        function updateUI() {
            scoreDisplay.innerText = count.toLocaleString();
            localStorage.setItem('bina_count', count);
        }

        // 3. برمجة النقر (التعدين)
        if (clickArea) {
            clickArea.addEventListener('click', () => {
                count += 1;
                updateUI();
                
                // تأثير حركة الدائرة
                clickArea.style.transform = "scale(0.95)";
                setTimeout(() => clickArea.style.transform = "scale(1)", 100);
            });
        }

        // 4. برمجة الإعلانات (Adsgram)
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "int-286" }) : null;

        function showAd() {
            if (AdController) {
                AdController.show().then(() => {
                    count += 500;
                    updateUI();
                }).catch((err) => console.log("Ad error/skipped", err));
            }
        }

        // تشغيل الإعلان وتحديث الواجهة عند البدء
        window.onload = () => {
            updateUI();
            setTimeout(showAd, 3000); // عرض إعلان بعد 3 ثوانٍ
        };
    </script>
</body>
</html>

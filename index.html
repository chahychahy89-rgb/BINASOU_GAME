<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU GOLD OFFICIAL</title>
    <style>
        :root { --gold: #ffae00; --bg: #0b0b0b; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* شريط الرصيد */
        .header { height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; border-bottom: 2px solid var(--gold); }
        #score { font-size: 55px; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px rgba(255,174,0,0.4); }

        /* منطقة العرض */
        .content { height: calc(100vh - 185px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .page { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        /* دائرة التعدين المتوهجة */
        .mining-circle { width: 260px; height: 260px; border: 8px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; background: radial-gradient(#222, #000); box-shadow: 0 0 50px rgba(255,174,0,0.3); transition: transform 0.05s; cursor: pointer; margin-top: 50px; }
        .mining-circle:active { transform: scale(0.94); }

        /* تحسين شكل المهام وروابط الإحالة */
        .item-card { background: var(--card); width: 100%; max-width: 400px; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--gold); }
        .item-info b { font-size: 16px; display: block; margin-bottom: 3px; }
        .item-info span { color: var(--gold); font-size: 14px; font-weight: bold; }
        .btn-link { background: var(--gold); color: #000; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; font-size: 14px; border: none; }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { background: none; border: none; color: #555; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-item.active-btn { color: var(--gold); font-weight: bold; }
    </style>
</head>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Miner</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 80px; }
        .page { display: none; width: 100%; text-align: center; }
        .active { display: block; }
        .circle { width: 200px; height: 200px; border: 6px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #ffb400; cursor: pointer; margin: 20px auto; box-shadow: 0 0 15px #ffb400; }
        .balance { font-size: 4rem; font-weight: bold; color: #ffb400; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active-btn { color: #ffb400; }
        .card { background: #1a1a1a; margin: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="content">
        <div id="mine-p" class="page active">
            <div style="color:#ffb400">⛏️ Binasou Miner Gold</div>
            <div class="circle" onclick="mine()">Binasou</div>
            <div class="balance" id="bal">2,500</div>
        </div>

        <div id="task-p" class="page">
            <h2>📋 المهام</h2>
            <div class="card"><span>متابعة القناة</span><b style="color:#ffb400">+5,000</b></div>
            <div class="card"><span>دعوة صديق</span><b style="color:#ffb400">+2,500</b></div>
        </div>

        <div id="friend-p" class="page">
            <h2>👥 الأصدقاء</h2>
            <p>شارك رابطك واربح عملات ذهبية!</p>
            <button style="padding:10px 20px; background:#ffb400; border:none; border-radius:5px;">نسخ الرابط</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-btn" onclick="show('mine-p', this)"><span>⛏️</span>تعدين</div>
        <div class="nav-item" onclick="show('task-p', this)"><span>📋</span>مهام</div>
        <div class="nav-item" onclick="show('friend-p', this)"><span>👥</span>أصدقاء</div>
    </div>

    <script>
        let gold = parseInt(localStorage.getItem('g_save')) || 2500;
        document.getElementById('bal').innerText = gold.toLocaleString();

        function mine() {
            gold += 100;
            document.getElementById('bal').innerText = gold.toLocaleString();
            localStorage.setItem('g_save', gold);
        }

        function show(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-btn'));
            document.getElementById(pId).classList.add('active');
            el.classList.add('active-btn');
        }
    </script>
</body>
</html>

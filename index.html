<div class="bottom-menu">
        <div class="menu-btn" onclick="openTab('friends-tab', this)">الأصدقاء</div>
        <div class="menu-btn active-btn" onclick="openTab('mine-tab', this)">تعدين</div>
        <div class="menu-btn" onclick="openTab('tasks-tab', this)">المهام</div>
    </div>

    <script>
        // المحرك البرمجي الأساسي
        let score = parseInt(localStorage.getItem('b_score')) || 0;
        const display = document.getElementById('total-balance');

        function refresh() {
            display.innerText = score.toLocaleString();
            localStorage.setItem('b_score', score);
        }

        // تفعيل النقر
        document.getElementById('tapZone').onclick = function() {
            score++;
            refresh();
        };

        // تفعيل التنقل بين الصفحات
        function openTab(tabId, btn) {
            document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.menu-btn').forEach(m => m.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active-view');
            btn.classList.add('active-btn');
        }

        // إضافة مكافآت المهام
        function addBonus(amt) {
            setTimeout(() => {
                score += amt;
                refresh();
                alert("تهانينا! تم إضافة المكافأة 🎉");
            }, 2000);
        }

        function share() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=اجمع الذهب معي!");
        }

        refresh();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold Miner</title>
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 80px; }
        .circle { width: 200px; height: 200px; border: 6px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #ffb400; box-shadow: 0 0 20px #ffb400; cursor: pointer; margin-bottom: 20px; }
        .score { font-size: 4.5rem; font-weight: bold; color: #ffb400; margin-bottom: 20px; }
        .mine-btn { background: #ffb400; color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        
        /* القائمة السفلية التي كانت مفقودة */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111; border-top: 2px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { color: #888; text-align: center; font-size: 0.9rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: #ffb400; font-weight: bold; }
        .nav-icon { font-size: 1.4rem; display: block; }
    </style>
</head>
<body>

    <div class="main-container">
        <div style="color: #ffb400; margin-bottom: 10px;">⛏️ Binasou Miner Gold</div>
        <div class="circle" onclick="mine()">Binasou</div>
        <div class="score" id="balance">2,200</div>
        <button class="mine-btn" onclick="mine()">تعدين الرصيد ⚡</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">⛏️</span>
            <span>تعدين</span>
        </div>
        <div class="nav-item" onclick="alert('قسم المهام يفتح قريباً!')">
            <span class="nav-icon">📋</span>
            <span>مهام</span>
        </div>
        <div class="nav-item" onclick="alert('قسم الأصدقاء يفتح قريباً!')">
            <span class="nav-icon">👥</span>
            <span>أصدقاء</span>
        </div>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('gold_bal')) || 2200;
        document.getElementById('balance').innerText = count.toLocaleString();

        function mine() {
            count += 100;
            document.getElementById('balance').innerText = count.toLocaleString();
            localStorage.setItem('gold_bal', count);
        }
    </script>
</body>
</html>

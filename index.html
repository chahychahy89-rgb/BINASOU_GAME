<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINASOU GOLD</title>
    <script src="https://adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { color: #FFD700; margin-bottom: 20px; }
        .circle {
            width: 200px; height: 200px; border: 8px solid #FFA500; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; user-select: none;
            box-shadow: 0 0 20px #FFA500; transition: transform 0.1s;
        }
        .circle:active { transform: scale(0.9); }
        .score { font-size: 48px; font-weight: bold; margin-top: 20px; color: #FFD700; }
        .footer { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>BINASOU GOLD ⛏️</h1>
    <div class="circle" id="tapBtn">Binasou</div>
    <div class="score" id="scoreVal">2,900</div>
</div>

<div class="footer">
    <button>أصدقاء</button>
    <button>مهام</button>
    <button onclick="location.reload()">تعدين</button>
</div>

<script>
    // برمجة العداد
    let count = parseInt(localStorage.getItem('bina_val')) || 2900;
    const scoreDisplay = document.getElementById('scoreVal');
    const btn = document.getElementById('tapBtn');

    function update() {
        scoreDisplay.innerText = count.toLocaleString();
        localStorage.setItem('bina_val', count);
    }

    btn.onclick = function() {
        count += 1;
        update();
    };

    // برمجة الإعلانات
    const Ads = window.Adsgram ? window.Adsgram.init({ blockId: "int-286" }) : null;
    function showAd() {
        if(Ads) Ads.show().then(() => { count += 500; update(); }).catch(() => {});
    }

    update();
    setTimeout(showAd, 4000); // إعلان بعد 4 ثوانٍ
</script>

</body>
</html>

<div class="navbar">
        <div class="nav-item" onclick="show('friends', this)">الأصدقاء</div>
        <div class="nav-item active-nav" onclick="show('mine', this)">تعدين</div>
        <div class="nav-item" onclick="show('tasks', this)">المهام</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('binasou_score')) || 0;
        const display = document.getElementById('balance');

        function update() {
            display.innerText = score.toLocaleString();
            localStorage.setItem('binasou_score', score);
        }

        function show(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active-view');
            el.classList.add('active-nav');
        }

        document.getElementById('tapBtn').onclick = () => { score++; update(); };

        function addBonus(n) {
            setTimeout(() => { score += n; update(); alert('تم إضافة المكافأة!'); }, 2000);
        }

        function invite() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=انضم واربح الذهب!");
        }

        update();
    </script>
</body>
</html>

            <h2 style="color: var(--gold); margin-bottom: 20px;">دعوة الأصدقاء 👥</h2>
            <div class="task-card" style="flex-direction: column; text-align: center; gap: 20px; border-right: none; border-top: 5px solid var(--gold);">
                <p style="font-size: 16px; line-height: 1.6;">شارك الرابط مع أصدقائك واحصل على مكافأة فورية قدرها <br><span style="color:var(--gold); font-size:22px; font-weight:bold;">2,500💰</span></p>

    <div class="nav-bar">
        <button class="nav-btn" onclick="showTab('friends', this)"><i>👥</i>الأصدقاء</button>
        <button class="nav-btn active-nav" onclick="showTab('mining', this)"><i>⛏️</i>تعدين</button>
        <button class="nav-btn" onclick="showTab('tasks', this)"><i>📋</i>المهام</button>
    </div>

    <script>
        // نظام حفظ الرصيد
        let score = parseInt(localStorage.getItem('binasou_pro_bal')) || 0;
        const balDisplay = document.getElementById('balance');

        function refreshUI() {
            balDisplay.innerText = score.toLocaleString();
            localStorage.setItem('binasou_pro_bal', score);
        }

        // تبديل الصفحات بسلاسة
        function showTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active-page');
            btn.classList.add('active-nav');
        }

        // تفعيل النقر (التعدين)
        document.getElementById('coinTap').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score += 1;
            refreshUI();
        });

        // تشغيل أزرار المهام ومنح المكافآت
        function giveReward(amount) {
            setTimeout(() => {
                score += amount;
                refreshUI();
                alert('تمت إضافة المكافأة بنجاح! 🎉');
            }, 2500); // تأخير بسيط لمحاكاة التحقق

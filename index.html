<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Mining Official</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* التحكم في ظهور الأقسام */
        .section { display: none; flex: 1; padding: 20px; text-align: center; overflow-y: auto; }
        .section.active { display: block; }

        .binasou-main-logo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #ffb400; margin: 20px auto; box-shadow: 0 0 15px #ffb400; }
        .balance-glow { color: #ffb400; font-size: 3rem; margin: 10px 0; }
        
        .mining-button { background: #ffb400; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 80%; cursor: pointer; font-size: 1.1rem; }
        
        /* تنسيق المهام */
        .task-card { background: #1a1a1a; border: 1px solid #ffb400; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: #ffb400; color: #000; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; text-decoration: none; }

        /* القائمة السفلية */
        .bottom-nav { background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-btn { color: #888; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .nav-btn.active { color: #ffb400; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="mining" class="section active">
            <div style="display:flex; justify-content: space-between; padding: 10px;">
                <span>Binasou Miner ⛏️</span>
                <span id="rank">رتبة: محترف 🚀</span>
            </div>
            <img src="https://raw.githubusercontent.com/chahychahy89-rgb/BINASOU_GAME/main/1000050825.jpg" class="binasou-main-logo">
            <h1 id="balance" class="balance-glow">2,000</h1>
            <p>عملة تعدين</p>
            <button class="mining-button" onclick="mine()">⚡ ابدأ التعدين واكسب 100</button>
        </div>

        <div id="tasks" class="section">
            <h2 style="color:#ffb400">📋 المهام اليومية</h2>
            <div class="task-card">
                <div style="text-align:right">
                    <span>انضم لقناة المجموعة</span><br>
                    <small style="color:#ffb400">+500 عملة</small>
                </div>
                <a href="https://t.me/Binasou4" target="_blank" class="task-btn" onclick="claim(500)">تنفيذ</a>
            </div>
        </div>

        <div id="friends" class="section">
            <h2 style="color:#ffb400">👥 دعوة الأصدقاء</h2>
            <div style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px dashed #ffb400">
                <p>احصل على 1,000 عملة عن كل صديق تدعوه!</p>
                <button class="mining-button" onclick="invite()">🔗 إرسال رابط الدعوة</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn active" onclick="tab('mining')">⛏️<br>تعدين</div>
            <div class="nav-btn" onclick="tab('tasks')">📋<br>مهام</div>
            <div class="nav-btn" onclick="tab('friends')">👥<br>أصدقاء</div>
        </div>
    </div>

        document.getElementById('balance').innerText = bal.toLocaleString();

</div>
                <div class="task-item">
                    <div style="text-align:right">قناة اليوتيوب<br><span style="color:#ffae00">+5,000 💰</span></div>
                    <a href="https://youtube.com/@chamschams-y7w" target="_blank" class="task-btn" onclick="rewardUser(5000)">اشتراك</a>
                </div>
            </div>
        </div>

        <div id="friends-tab" class="tab-content">
            <div style="padding-top:40px;">
                <p>اربح عن كل صديق</p>
                <h1 style="color:#ffae00; font-size:50px;">3,000</h1>
                <button class="task-btn" style="width:200px; padding:15px;" onclick="shareGame()">دعوة الأصدقاء 🚀</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="nav-link" onclick="switchTab('friends-tab', this)">الأصدقاء</div>
        <div class="nav-link active-link" onclick="switchTab('mine-tab', this)">تعدين</div>
        <div class="nav-link" onclick="switchTab('tasks-tab', this)">المهام</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('binasou_points')) || 0;
        const balDisplay = document.getElementById('balance');

        function updateUI() {
            balDisplay.innerText = score.toLocaleString();
            localStorage.setItem('binasou_points', score);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-link'));
            document.getElementById(tabId).classList.add('active-tab');
            el.classList.add('active-link');
        }

        document.getElementById('coinTap').onclick = function() {
            score++;
            updateUI();
        };

        function rewardUser(amt) {
            setTimeout(() => {
                score += amt;
                updateUI();
                alert('مبروك! تم استلام ' + amt);
            }, 2000);
        }

        function shareGame() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=ابدأ التعدين الآن!");
        }

        updateUI();
    </script>
</body>
</html>

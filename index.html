<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Game</title>
    <style>
        /* إعدادات الشاشة ومنع التعليق */
        * { 
            touch-action: manipulation !important; 
            -webkit-tap-highlight-color: transparent !important; 
            box-sizing: border-box; 
            user-select: none; 
        }
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* الحاوية الرئيسية */
        .container { flex: 1; position: relative; width: 100%; }
        .page { 
            display: none; 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            text-align: center; 
            padding: 40px 20px; 
        }
        .active { display: block; }

        /* صفحة التعدين */
        .gold-circle { 
            width: 220px; 
            height: 220px; 
            border: 10px solid #ffb400; 
            border-radius: 50%; 
            margin: 30px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2rem; 
            color: #ffb400; 
            background: rgba(255,180,0,0.1); 
            cursor: pointer; 
            box-shadow: 0 0 25px rgba(255,180,0,0.4); 
            transition: transform 0.1s; 
        }
        .gold-circle:active { transform: scale(0.92); background: rgba(255,180,0,0.3); }
        .score { font-size: 4.5rem; font-weight: bold; color: #ffb400; margin: 10px 0; }

        /* الأقسام والمهام */
        .card { 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            margin: 20px 0; 
        }
        .link-box { 
            background: #000; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px dashed #ffb400; 
            color: #ffb400; 
            word-break: break-all; 
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        button { 
            background: #ffb400; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1rem;
        }

        /* شريط التنقل السفلي */
        .navbar { 
            height: 85px; 
            background: #111; 
            display: flex; 
            border-top: 2px solid #333;

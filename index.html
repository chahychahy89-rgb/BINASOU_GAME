<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Mining</title>
<link rel="stylesheet" href="style.css?v=2">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span class="username">Binasou Miner ⛏️</span>
            <span class="rank" id="user-rank">رتبة: مبتدئ</span>
        </div>

        <div class="main-content">
            <div class="coin-card">
                <img src="https://cdn-icons-png.flaticon.com/512/5434/5434687.png" class="coin-logo">
                <div class="balance-wrapper">
                    <h1 id="balance">0</h1>
                    <p>عملة تعدين</p>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-item">
                    <small>الربح/ساعة</small>
                    <strong>100</strong>
                </div>
                <div class="stat-item">
                    <small>الإنجاز</small>
                    <strong id="progress-text">0%</strong>
                </div>
            </div>

            <button id="adBtn" class="mining-button">
                <span>⚡</span> ابدأ التعدين واكسب 100
            </button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-btn active"><span>⛏️</span><small>تعدين</small></div>
            <div class="nav-btn"><span>📋</span><small>مهام</small></div>
            <div class="nav-btn"><span>👥</span><small>أصدقاء</small></div>
            <div class="nav-btn"><span>🏆</span><small>ترتيب</small></div>
        </nav>
    </div>
<script src="script.js?v=2"></script>
</body>
</html>

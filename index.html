<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold Miner</title>
    <style>
        /* منع أي تأخير في اللمس */
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 20px; text-align: center; color: #ffb400; font-weight: bold; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* زر التعدين الرئيسي */
        .circle-btn { width: 220px; height: 220px; border: 8px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #ffb400; background: rgba(255,180,0,0.1); cursor: pointer; box-shadow: 0 0 20px rgba(255,180,0,0.4); transition: transform 0.1s; }
        .circle-btn:active { transform: scale(0.92); background: rgba(255,180,0,0.3); }
        
        .balance { font-size: 4.5rem; font-weight: bold; color: #ffb400; margin-top: 20px; }
        
        /* القائمة السفلية */
        .nav-bar { width: 100%; height: 80px; background: #111; display: flex; border-top: 1px solid #333; position: fixed; bottom: 0; }
        .nav-button { flex: 1; border: none; background: none; color: #666; font-size: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-button.active { color: #ffb400; font-weight: bold; }
        .nav-button span { font-size: 1.5rem; }

        /* الأقسام */
        .page { display: none; width: 100%; padding: 20px; text-align: center; }
        .page.active { display: block; }

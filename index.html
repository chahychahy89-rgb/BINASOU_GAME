<script>
        // دمج الكود الذي كتبته يدويًا في صورتك
        let score = parseInt(localStorage.getItem('b_score')) || 0;
        const balEl = document.getElementById('balance');

        function update() {
            balEl.innerText = score.toLocaleString();
            localStorage.setItem('b_score', score);
        }

        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
        }

        // نظام النقر (Tap)
        document.getElementById('tap').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            update();
        });

        // نظام المهام (Gift)
        function gift(n) {
            setTimeout(() => {
                score += n;
                update();
                alert('تمت إضافة الجائزة بنجاح! 🎉');
            }, 2000);
        }

        // نظام الإحالة (Invite)
        function invite() {
            const url = "https://t.me/binasou_win_bot";
            const text = encodeURIComponent("انضم إليّ في BINASOU واجمع الذهب! ⛏️💰");
            window.open(https://t.me/share/url?url=${url}&text=${text});
        }

        update();
    </script>
</body>
</html>

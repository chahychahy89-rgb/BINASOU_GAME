<div style="margin-top:40px;">
                <h1 style="color:#ffae00; font-size:60px;">3,000</h1>
                <p>عن كل صديق ينضم</p>
                <button class="gold-btn" style="width:200px; padding:15px;" onclick="shareGame()">دعوة الأصدقاء 🚀</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link" onclick="tab('friends', this)">الأصدقاء</div>
        <div class="nav-link nav-active" onclick="tab('mine', this)">تعدين</div>
        <div class="nav-link" onclick="tab('tasks', this)">المهام</div>
    </div>

    <script>
        // نظام النقاط والتشغيل
        let pts = parseInt(localStorage.getItem('b_pts')) || 0;
        const bal = document.getElementById('balance');

        function update() {
            bal.innerText = pts.toLocaleString();
            localStorage.setItem('b_pts', pts);
        }

        // تفعيل النقر على العملة
        document.getElementById('coinTap').onclick = () => {
            pts++;
            update();
        };

        // تفعيل تبديل الصفحات (حل مشكلة التوقف)
        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active-tab');
            el.classList.add('nav-active');
        }

        // تفعيل الروابط والمكافآت
        function openTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                pts += reward;
                update();
                alert('مبروك! تم إضافة ' + reward + ' نقطة');
            }, 2000);
        }

        function shareGame() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=انضم إلينا!");
        }

        update();
    </script>
</body>
</html>

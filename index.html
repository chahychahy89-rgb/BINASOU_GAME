<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Ultra Fix</title>
    <style>
        /* كود إجباري لكسر الجمود */
        * { touch-action: manipulation !important; -webkit-tap-highlight-color: transparent !important; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* زر ضخم لا يمكن تجاهله */
        #tapArea { width: 250px; height: 250px; border: 10px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #ffb400; background: rgba(255,180,0,0.1); cursor: pointer; user-select: none; box-shadow: 0 0 30px #ffb400; }
        #tapArea:active { transform: scale(0.9); background: rgba(255,180,0,0.5); }
        
        .score-val { font-size: 5rem; font-weight: bold; color: #ffb400; margin-top: 20px; }
        .footer { position: fixed; bottom: 0; width: 100%; height: 80px; background: #111; display: flex; border-top: 2px solid #333; }
        .f-btn { flex: 1; border: none; background: none; color: #ffb400; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onclick="void(0)"> <h2 style="color:#ffb400">⛏️ BINASOU GOLD</h2>
    
    <div id="tapArea">Binasou</div>
    <div class="score-val" id="score">2,500</div>

    <div class="footer">
        <button class="f-btn" onclick="alert('قسم المهام سيفتح قريباً!')">📋 المهام</button>
        <button class="f-btn" onclick="alert('قسم الأصدقاء سيفتح قريباً!')">👥 الأصدقاء</button>
    </div>

    <script>
        // نظام العمل الفوري
        let pts = parseInt(localStorage.getItem('pts_binasou')) || 2500;
        const s = document.getElementById('score');
        s.innerText = pts.toLocaleString();

        // تفعيل الضغط بطريقة مباشرة جداً
        const btn = document.getElementById('tapArea');
        btn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // منع المتصفح من التأخر
            pts += 100;
            update();
        }, false);

        btn.addEventListener('mousedown', function() {
            pts += 100;
            update();
        });

        function update() {
            s.innerText = pts.toLocaleString();
            localStorage.setItem('pts_binasou', pts);
        }
    </script>
</body>
</html>

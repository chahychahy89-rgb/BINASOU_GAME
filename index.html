<script>
    let points = parseInt(localStorage.getItem('binasou_points')) || 2500;
    const scoreDisplay = document.getElementById('score');
    scoreDisplay.innerText = points.toLocaleString();

    function openTab(tabId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function addPoint() {
        points += 100;
        updateUI();
    }

    function claimBonus(amt) {
        points += amt;
        updateUI();
        alert("تمت إضافة المكافأة!");
    }

    function copyLink() {
        alert("تم نسخ رابط الدعوة بنجاح!");
    }

    function updateUI() {
        scoreDisplay.innerText = points.toLocaleString();
        localStorage.setItem('binasou_points', points);
    }
</script>

</body>
</html>

<div id="page-friends" class="page">
            <h2 style="color: var(--gold)">نظام الإحالة 👥</h2>
            <div style="margin-top: 60px">
                <h1 style="color: var(--gold); font-size: 60px;">+3,000</h1>
                <p>عن كل صديق يسجل من خلالك</p>
                <button class="action-btn" style="width: 80%; padding: 18px;" onclick="inviteFriend()">دعوة الأصدقاء 🚀</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-tab" onclick="switchTab('page-friends', this)">الأصدقاء</div>
        <div class="nav-item nav-tab active-tab" onclick="switchTab('page-mine', this)">تعدين</div>
        <div class="nav-tab" onclick="switchTab('page-tasks', this)">المهام</div>
    </div>

    <script>
        // نظام النقاط (حفظ واسترجاع)
        let goldCount = parseInt(localStorage.getItem('binasou_p')) || 0;
        const balEl = document.getElementById('main-balance');

        function refreshUI() {
            balEl.innerText = goldCount.toLocaleString();
            localStorage.setItem('binasou_p', goldCount);
        }

        // 1. تفعيل زر التعدين (B)
        document.getElementById('coinTap').onclick = () => {
            goldCount++;
            refreshUI();
        };

        // 2. تفعيل تغيير الصفحات (الناف بار)
        function switchTab(targetId, navEl) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // إلغاء تفعيل كل الأزرار
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active-tab'));
            
            // إظهار الصفحة المطلوبة وتفعيل زرها
            document.getElementById(targetId).classList.add('active');
            navEl.classList.add('active-tab');
        }

        // 3. تفعيل الروابط مع إضافة مكافأة
        function openLink(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                goldCount += reward;
                refreshUI();
                alert("تم التحقق! أضفنا " + reward + " إلى رصيدك 🎉");
            }, 2000);
        }

        // 4. تفعيل زر المشاركة
        function inviteFriend() {
            const shareUrl = "https://t.me/share/url?url=https://t.me/binasou_win_bot&text=ابدأ جمع الذهب في BINASOU!";
            window.open(shareUrl, '_blank');
        }

        refreshUI();
    </script>
</body>
</html>

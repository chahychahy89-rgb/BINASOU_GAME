<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }
        
        /* دائرة التعدين */
        .circle { width: 190px; height: 190px; border: 6px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #ffb400; margin: 30px auto; cursor: pointer; background: rgba(255,180,0,0.1); box-shadow: 0 0 20px #ffb400; }
        .balance { font-size: 3.5rem; font-weight: bold; color: #ffb400; margin: 10px 0; }
        
        /* المهام */
        .card { background: #111; padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #ffb400; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 0.9rem; }
        
        /* القائمة */
        .nav { height: 75px; background: #0a0a0a; border-top: 1px solid #333; display: flex; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; cursor: pointer; }
        .nav-item.active-nav { color: #ffb400; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="content">
    <div id="m" class="page active">
        <p style="color:#ffb400">⛏️ BINASOU MINER</p>
        <div class="circle" onclick="tap()">Binasou</div>
        <div class="balance" id="score">2,500</div>
    </div>

    <div id="t" class="page">
        <h2 style="color:#ffb400">📋 المهام</h2>
        <div class="card">
            <div style="text-align:right">قناتنا الرسمية<br><small style="color:#ffb400">+5,000</small></div>
            <a href="https://t.me/binasou4" class="btn" onclick="gift(5000)">انضم</a>
        </div>
        <div class="card">
            <div style="text-align:right">جروب النقاش<br><small style="color:#ffb400">+3,000</small></div>
            <a href="https://t.me/binasou" class="btn" onclick="gift(3000)">انضم</a>
        </div>
    </div>

    <div id="f" class="page">
        <h2 style="color:#ffb400">👥 الأصدقاء</h2>
        <div class="card" style="flex-direction:column; gap:15px;">
            <p>اربح 2,500 عملة عن كل دعوة!</p>
            <button class="btn" style="width:100%" onclick="invite()">🔗 إرسال رابط الدعوة</button>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active-nav" onclick="show('m', this)"><span>⛏️</span>تعدين</div>
    <div class="nav-item" onclick="show('t', this)"><span>📋</span>مهام</div>
    <div class="nav-item" onclick="show('f', this)"><span>👥</span>أصدقاء</div>
</div>

<script>
    let b = parseInt(localStorage.getItem('b_save')) || 2500;
    const s = document.getElementById('score');
    s.innerText = b.toLocaleString();

    function tap() { b += 100; update(); }
    function gift(a) { b += a; update(); alert("مبروك الهدية! 🎉"); }
    
    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active-nav');
    }

    function invite() {
        const link = "https://t.me/BinasouBot"; // ضعي يوزر بوتك هنا
        window.open(https://t.me/share/url?url=${link}&text=العب معي!);
    }

    function update() {
        s.innerText = b.toLocaleString();
        localStorage.setItem('b_save', b);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold</title>
    <style>
        /* إعدادات تمنع أي تداخل في اللمس */
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        .wrapper { height: calc(100vh - 85px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; text-align: center; }
        .page.active { display: block; }
        
        /* دائرة التعدين - جعلناها زر حقيقي */
        .mine-button { width: 200px; height: 200px; border: 8px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #ffb400; margin: 30px auto; background: rgba(255,180,0,0.1); box-shadow: 0 0 20px #ffb400; cursor: pointer; border: 8px solid #ffb400; }
        .mine-button:active { transform: scale(0.9); background: rgba(255,180,0,0.4); }
        .bal-text { font-size: 4.5rem; font-weight: bold; color: #ffb400; margin: 10px 0; }

        /* الأزرار السفلية - نظام الأزرار المنفصلة */
        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #0d0d0d; display: flex; border-top: 2px solid #333; z-index: 9999; }
        .nav-item { flex: 1; background: none; border: none; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-item.selected { color: #ffb400; }
        .nav-item span { font-size: 1.8rem; pointer-events: none; }

        /* المهام */
        .task-box { background: #111; padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .gold-btn { background: #ffb400; color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

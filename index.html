<script>
    let score = parseInt(localStorage.getItem('saved_v')) || 2200;
    const display = document.getElementById('main-score');
    display.innerText = score.toLocaleString();

    function switchTab(viewId, el) {
        // إخفاء كل المشاهد
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        
        // إظهار المشهد المختار
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    function tap() {
        score += 100;
        updateUI();
    }

    function addReward(amt) {
        score += amt;
        updateUI();
        alert("مبروك! تم إضافة المكافأة.");
    }

    function updateUI() {
        localStorage.setItem('saved_v', score);
        display.innerText = score.toLocaleString();
    }
</script>

</body>
</html>

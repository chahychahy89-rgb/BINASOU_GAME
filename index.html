<div class="footer">
        <button id="btnFriends" onclick="showPage('friendsPage')"><i>👥</i><span>الأصدقاء</span></button>
        <button id="btnMining" class="active" onclick="showPage('miningPage')"><i>⛏️</i><span>تعدين</span></button>
        <button id="btnTasks" onclick="showPage('tasksPage')"><i>📋</i><span>المهام</span></button>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('bina_total')) || 2906;
        const scoreDisplay = document.getElementById('ts');
        const topScore = document.getElementById('topScore');

        function updateUI() {
            const formatted = count.toLocaleString();
            scoreDisplay.innerText = formatted;
            topScore.innerText = formatted;
            localStorage.setItem('bina_total', count);
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.footer button').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            
            if(pageId === 'miningPage') document.getElementById('btnMining').classList.add('active');
            if(pageId === 'tasksPage') document.getElementById('btnTasks').classList.add('active');
            if(pageId === 'friendsPage') document.getElementById('btnFriends').classList.add('active');
        }

        // معالجة النقر السريع
        document.getElementById('tapArea').addEventListener('touchstart', (e) => {
            e.preventDefault();
            count += 1;
            updateUI();
        });

        // تنفيذ المهام
        function doTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                count += reward;
                updateUI();
                alert('مبروك! تم إضافة المكافأة');
            }, 3000);
        }

        // نظام الإعلانات
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "int-286" }) : null;
        function showRewardAd() {
            if (AdController) {
                AdController.show().then(() => { count += 1000; updateUI(); }).catch(() => {});
            } else { alert('الإعلان غير جاهز بعد'); }
        }

        function shareLink() {
            const text = "العب معي واجمع الذهب في BINASOU!";
            window.open(https://t.me/share/url?url=https://t.me/binasou_win_bot&text=${text});
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Miner Gold</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main { flex: 1; position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .section { display: none; width: 100%; text-align: center; }
        .section.active { display: block; }
        
        /* دائرة التعدين */
        .clicker { width: 210px; height: 210px; border: 8px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #ffb400; margin: 40px auto; cursor: pointer; background: radial-gradient(circle, rgba(255,180,0,0.2) 0%, rgba(0,0,0,0) 70%); box-shadow: 0 0 30px rgba(255,180,0,0.5); }
        .clicker:active { transform: scale(0.95); }
        .bal-val { font-size: 4rem; font-weight: bold; color: #ffb400; margin: 15px 0; text-shadow: 0 0 10px rgba(255,180,0,0.3); }
        
        /* القائمة السفلية ثابتة وقوية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #0d0d0d; display: flex; border-top: 2px solid #222; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; cursor: pointer; border: none; background: none; }
        .nav-link.on { color: #ffb400; font-weight: bold; }
        .nav-link span { font-size: 1.6rem; margin-bottom: 5px; }

        /* كروت المهام */
        .task-card { background: #151515; padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-go { background: #ffb400; color: #000; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div class="main">
        <div id="mine-sec" class="section active">
            <p style="color:#ffb400; font-weight:bold;">⛏️ BINASOU MINER GOLD</p>
            <div class="clicker" onclick="handleMining()">Binasou</div>
            <div class="bal-val" id="scoreDisp">2,500</div>
            <p style="color:#666">المس الدائرة لجمع الذهب</p>
        </div>

        <div id="task-sec" class="section">
            <h2 style="color:#ffb400">📋 المهام</h2>
            <div class="task-card">
                <div style="text-align:right">قناة تليجرام<br><small style="color:#ffb400">+5,000</small></div>
                <a href="https://t.me/binasou4" target="_blank" class="btn-go" onclick="claim(5000)">انضم</a>
            </div>
            <div class="task-card">
                <div style="text-align:right">جروب المناقشة<br><small style="color:#ffb400">+3,000</small></div>
                <a href="https://t.me/binasou" target="_blank" class="btn-go" onclick="claim(3000)">انضم</a>
            </div>
        </div>

        <div id="friend-sec" class="section">
            <h2 style="color:#ffb400">👥 الأصدقاء</h2>
            <div class="task-card" style="flex-direction:column; gap:20px;">
                <p>ادعُ صديقاً واحصل على 2,500 عملة</p>
                <button class="btn-go" style="width:100%" onclick="doInvite()">🔗 إرسال رابط الدعوة</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link on" id="btn-m" onclick="tab('mine-sec', 'btn-m')"><span>⛏️</span>تعدين</div>

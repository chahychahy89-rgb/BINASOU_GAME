    <script>
        // المحرك البرمجي للبوت
        let userPoints = parseInt(localStorage.getItem('binasou_v3_points')) || 0;
        const balDisplay = document.getElementById('balance');

        function sync() {
            balDisplay.innerText = userPoints.toLocaleString();
            localStorage.setItem('binasou_v3_points', userPoints);
        }

        // تشغيل النقر
        document.getElementById('tapTarget').addEventListener('click', function() {
            userPoints++;
            sync();
        });

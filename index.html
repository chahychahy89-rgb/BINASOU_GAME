<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binasou Mining</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="user-info">
                <span class="username">Binasou Miner</span>
                <span class="rank">مبتدئ</span>
            </div>
        </div>

        <div class="mining-section">
            <div class="coin-display">
                <img src="https://cdn-icons-png.flaticon.com/512/5434/5434687.png" class="coin-icon">
                <h1 id="balance">0</h1>
                <p>عملات معلقة</p>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span>لكل ساعة</span>
                    <strong>100</strong>
                </div>
                <div class="stat-box">
                    <span>التقدم</span>
                    <strong id="progress-text">0%</strong>
                </div>
            </div>

            <button id="adBtn" class="main-btn">
                <span class="icon">⛏️</span> ابدأ التعدين (شاهد إعلان)
            </button>
        </div>

        <nav class="navbar">
            <div class="nav-item active">
                <span>⛏️</span>
                <small>تعدين</small>
            </div>
            <div class="nav-item">
                <span>📋</span>
                <small>مهام</small>
            </div>
            <div class="nav-item">
                <span>👥</span>
                <small>أصدقاء</small>
            </div>
            <div class="nav-item">
                <span>🏆</span>
                <small>ترتيب</small>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>

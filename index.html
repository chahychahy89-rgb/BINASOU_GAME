<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU GOLD</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; }
        .header { padding: 30px; font-size: 50px; color: #ffae00; font-weight: bold; }
        .tap-zone { height: 65vh; display: flex; align-items: center; justify-content: center; }
        .coin { width: 220px; height: 220px; border: 10px solid #ffae00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; background: radial-gradient(#222, #000); box-shadow: 0 0 30px #ffae00; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.05s; }
        .coin:active { transform: scale(0.92); }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 2px solid #222; height: 70px; }
        .nav-btn { flex: 1; border: none; background: none; color: #666; font-size: 16px; cursor: pointer; }
        .nav-btn.active { color: #ffae00; font-weight: bold; }
        .screen { display: none; padding: 20px; }
        .active-screen { display: block; }
    </style>
</head>
<body>

    <div id="score" class="header">0</div>

    <div id="mPage" class="screen active-screen">
        <div class="tap-zone">
            <div class="coin" id="mainCoin">Binasou</div>
        </div>
    </div>

    <div id="tPage" class="screen">
        <h2>المهام اليومية 📋</h2>
        <div style="background:#1a1a1a; padding:20px; border-radius:15px; border-right:5px solid #ffae00;">
            قناة التليجرام (+5,000)
            <button onclick="window.open('https://t.me/your_channel')" style="background:#ffae00; border:none; padding:10px; border-radius:8px; float:left; font-weight:bold;">انضم</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn" onclick="show('tPage', this)">المهام</button>
        <button class="nav-btn active" onclick="show('mPage', this)">تعدين</button>
        <button class="nav-btn" onclick="alert('قريباً!')">الأصدقاء</button>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('b_gold')) || 0;
        const scoreDiv = document.getElementById('score');

        function update() {
            scoreDiv.innerText = balance.toLocaleString();
            localStorage.setItem('b_gold', balance);
        }

        function show(id, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            btn.classList.add('active');
        }

        document.getElementById('mainCoin').addEventListener('touchstart', function(e) {
            e.preventDefault();
            balance++;
            update();
        });

        update();
    </script>
</body>
</html>

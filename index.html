<div id="friends" class="page">
            <h2 style="color:#ffae00">نظام الإحالة 👥</h2>
            <div style="margin-top:50px">
                <h1 style="color:#ffae00; font-size:60px;">3,000</h1>
                <p>عن كل صديق ينضم للبوت</p>
                <button class="btn" style="width:200px; padding:15px;" onclick="invite()">دعوة الآن 🚀</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="switchTab('friends', this)">الأصدقاء</div>
        <div class="nav-item nav-active" onclick="switchTab('mine', this)">تعدين</div>
        <div class="nav-item" onclick="switchTab('tasks', this)">المهام</div>
    </div>

    <script>
        // نظام النقاط والبرمجة
        let gold = parseInt(localStorage.getItem('userGold')) || 0;
        const balEl = document.getElementById('balance');

        function sync() {
            balEl.innerText = gold.toLocaleString();
            localStorage.setItem('userGold', gold);
        }

        // تفعيل النقر على العملة
        document.getElementById('tapBtn').onclick = () => {
            gold++;
            sync();
        };

        // تفعيل التنقل بين الصفحات (حل مشكلة الأزرار الميتة)
        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('nav-active');
        }

        // تفعيل الروابط مع المكافآت
        function goTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => {
                gold += reward;
                sync();
                alert("تم التحقق وإضافة " + reward + " نقطة! 🎉");
            }, 2000);
        }

        function invite() {
            window.open("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=اجمع الذهب معي!");
        }

        sync();
    </script>
</body>
</html>

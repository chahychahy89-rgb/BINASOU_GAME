<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binasou Gold App</title>
    <style>
        /* إعدادات الشاشة الكاملة */
        body, html { 
            background: #000 !important; color: #fff; margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; font-family: sans-serif; 
        }

        /* الحاوية الأساسية */
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* منطقة المحتوى المتغير */
        .main-view { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .section { display: none; }
        .section.active { display: block; }

        /* دائرة Binasou المتوهجة */
        .b-circle { 
            width: 180px; height: 180px; border-radius: 50%; border: 6px solid #ffb400; 
            margin: 40px auto; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold; color: #ffb400; text-shadow: 0 0 15px #ffb400;
            box-shadow: 0 0 25px rgba(255, 180, 0, 0.4); cursor: pointer;
        }

        .b-score { font-size: 4.5rem; font-weight: bold; color: #ffb400; margin: 15px 0; }
        .btn-gold { background: #ffb400; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.2rem; cursor: pointer; }

        /* القائمة السفلية - إجبار الظهور في أعلى طبقة */
        .footer-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: #111; display: flex; border-top: 2px solid #222; 
            z-index: 99999 !important; align-items: center;
        }
        .nav-btn { flex: 1; color: #666; text-align: center; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active { color: #ffb400; font-weight: bold; }

        /* كروت المهام */
        .task-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="main-view">
        <div id="view1" class="section active">
            <h4 style="color: #ffb400;">Binasou Miner Gold ⛏️</h4>
            <div class="b-circle" onclick="addOne()">Binasou</div>
            <div class="b-score" id="val">2,200</div>
            <button class="btn-gold" onclick="addOne()">⚡ تعدين الرصيد</button>
        </div>

        <div id="view2" class="section">
            <h2 style="color:#ffb400">📋 المهام</h2>
            <div class="task-card">
                <div style="text-align:right"><span>مهمة تليجرام</span><br><small style="color:#ffb400">+1,000</small></div>
                <button onclick="getBonus(1000)" style="background:#ffb400; border:none; padding:8px; border-radius:5px;">استلام</button>
            </div>
            <div class="task-card">
                <div style="text-align:right"><span>مهمة يوتيوب</span><br><small style="color:#ffb400">+500</small></div>
                <button onclick="getBonus(500)" style="background:#ffb400; border:none; padding:8px; border-radius:5px;">استلام</button>
            </div>
        </div>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU GOLD</title>
    <style>
        body { background: #000; color: #ffb400; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .circle { width: 200px; height: 200px; border: 8px solid #ffb400; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(255,180,0,0.1); cursor: pointer; margin-bottom: 20px; box-shadow: 0 0 20px #ffb40055; }
        .score { font-size: 3rem; font-weight: bold; }
        .navbar { height: 70px; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; background: #0a0a0a; width: 100%; }
        .nav-item { color: #555; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .nav-item.active { color: #ffb400; }
        .page { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: #ffb400; color: #000; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; width: 80%; }
    </style>
<script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
<body>
    <div class="container">
        <div id="p1" class="page active">
            <h2>⛏️ BINASOU GOLD</h2>
            <div class="circle" onclick="add(); showAd();">Binasou</div>
            <div class="score" id="s">2,900</div>
        </div>
        <div id="p2" class="page">
            <h2>📋 المهام</h2>
            <button class="btn" onclick="window.open('https://t.me/binasou_win_bot')">قناتنا الرسمية</button>
        </div>
        <div id="p3" class="page">
            <h2>👥 الأصدقاء</h2>
            <div style="font-size: 0.8rem; border: 1px dashed #ffb400; padding: 10px; margin: 10px;">https://t.me/binasou_win_bot?start=user</div>
            <button class="btn" onclick="alert('تم النسخ!')">نسخ الرابط</button>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="tab('p1', this)">تعدين</div>
        <div class="nav-item" onclick="tab('p2', this)">مهام</div>
        <div class="nav-item" onclick="tab('p3', this)">أصدقاء</div>
    </div>

    <script>
     // كود اللعبة الأصلي
    let count = 2900;
    function add() {
        count += 100;
        document.getElementById('ts').innerText = count.toLocaleString();
    }
    
    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- كود إعلانات Adsgram الجديد ---
    const AdController = window.Adsgram.init({ blockId: "int-28086" });

    function showAd() {
        AdController.show().then((result) => {
            // مكافأة اختيارية عند مشاهدة الإعلان كاملاً
            count += 500; 
            document.getElementById('ts').innerText = count.toLocaleString();
            console.log("Ad watched successfully");
        }).catch((result) => {
            console.error("Ad error:", result);
        });
    }

  // --- كود إعلانات Adsgram الجديد ---
// تأكد أن هذا الجزء يعمل فقط إذا كان المكتبة محملة
const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "int-286" }) : null;

function showAd() {
    if (AdController) {
        AdController.show().then((result) => {
            // مكافأة عند مشاهدة الإعلان كاملاً
            count += 500;
            const tsElement = document.getElementById('ts');
            if (tsElement) tsElement.innerText = count.toLocaleString();
            console.log("Ad watched successfully");
        }).catch((result) => {
            console.error("Ad error:", result);
        });
    } else {
        console.log("Adsgram not loaded yet");
    }
}

// تشغيل الإعلان بعد ثانيتين (اختياري)
window.onload = function() {
    setTimeout(() => {
        // نتحقق أولاً هل الحساب مفعل أم لا لتجنب التعليق
        showAd();
    }, 2000);
};
